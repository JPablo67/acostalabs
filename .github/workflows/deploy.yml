name: Deploy AcostaLabs.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to Production
        run: |
          cd ~/apps/acostalabs

          # Pull latest code
          git fetch --all
          git checkout main
          git pull origin main

          # Rebuild and restart container
          sudo docker compose down
          sudo docker compose up -d --build

          # Clean up old images
          sudo docker image prune -f

          # Verify deployment
          sleep 5
          curl -sf http://localhost:3001 > /dev/null && echo "✅ Deploy successful" || echo "❌ Deploy failed"
