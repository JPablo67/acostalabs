name: Deploy AcostaLabs.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to Production
        run: |
          cd ~/Documents/Projects/acostalabs

          # Pull latest code
          git fetch --all
          git checkout main
          git pull origin main

          # Build new image FIRST (old container keeps running)
          sudo docker compose build

          # Swap: stop old → start new (sub-second downtime)
          sudo docker compose up -d --force-recreate --no-build

          # Clean up old images
          sudo docker image prune -f

          # Verify deployment
          sleep 5
          curl -sf http://localhost:3001 > /dev/null && echo "✅ Deploy successful" || echo "❌ Deploy failed"
