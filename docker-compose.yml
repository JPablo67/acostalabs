services:
  acostalabs:
    build: .
    container_name: acostalabs-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  db-ui:
    image: coleifer/sqlite-web
    container_name: acostalabs-db-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - sqlite_data:/data
    environment:
      - SQLITE_WEB_PASSWORD=${DB_UI_PASSWORD:-acostalabs_admin}
    command: sqlite_web -H 0.0.0.0 -x --password ${DB_UI_PASSWORD:-acostalabs_admin} /data/contacts.db
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  sqlite_data:
